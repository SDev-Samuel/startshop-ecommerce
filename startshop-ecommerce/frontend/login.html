<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesion | StartShop</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <a href="index.html" class="brand">StartShop</a>
    <nav id="nav-links"></nav>
  </header>

  <main class="container">
    <div class="card form-container">
      <h2 style="text-align:center; margin-bottom: 1.2rem;">Iniciar sesion</h2>

      <div id="auth-alert" class="alert alert-error" style="display:none;"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Correo electronico</label>
          <input type="email" id="email" required placeholder="tu@correo.com" />
        </div>
        <div class="form-group">
          <label for="password">Contrasena</label>
          <input type="password" id="password" required placeholder="••••••••" />
        </div>
        <button type="submit" id="submit-btn" class="btn btn-primary">Iniciar sesion</button>
      </form>

      <div class="form-footer">
        ¿No tienes cuenta? <a href="register.html">Crear cuenta</a>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth-storage.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById("login-form").addEventListener("submit", handleLogin);
  </script>
</body>
</html>
