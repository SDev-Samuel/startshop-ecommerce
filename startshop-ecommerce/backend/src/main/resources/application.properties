# ============================================
# Configuracion de la aplicacion StartShop API
# ============================================

spring.application.name=startshop-ecommerce

# --- Base de datos H2 (vive en un archivo dentro de la carpeta /data) ---
# Ventaja para aprender: no necesitas instalar ni configurar PostgreSQL.
spring.datasource.url=jdbc:h2:file:./data/startshopdb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate crea/actualiza las tablas automaticamente segun tus entidades @Entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Consola web para ver tus tablas en el navegador: http://localhost:8080/h2-console
# JDBC URL a usar dentro de la consola: jdbc:h2:file:./data/startshopdb
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080

# --- JWT ---
# jwt.secret: la "llave" con la que se firman los tokens. Cambiala en un proyecto real.
jwt.secret=StartShopSuperSecretKeyForJWT2026ChangeInProductionPlease123456
jwt.expiration-ms=86400000
